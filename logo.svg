<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Fondo glass -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>

    <!-- Borde glass -->
    <linearGradient id="stroke" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.1"/>
    </linearGradient>

    <!-- Blur tipo glass -->
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <!-- Fondo oscuro -->
  <rect width="512" height="512" rx="120" fill="#0a0a0a"/>

  <!-- Glass layer -->
  <rect width="512" height="512" rx="120" fill="url(#bg)" filter="url(#blur)"/>

  <!-- Borde -->
  <rect width="512" height="512" rx="120" fill="none" stroke="url(#stroke)" stroke-width="3"/>

  <!-- Tu símbolo (simplificado circular swirl) -->
  <g transform="translate(256,256)">
    <circle r="110" fill="none" stroke="#ffffff" stroke-width="20" opacity="0.9"/>
    <path d="M 0 -110 A 110 110 0 1 1 -70 80" 
          fill="none" 
          stroke="#ffffff" 
          stroke-width="20" 
          stroke-linecap="round"/>
  </g>
</svg>